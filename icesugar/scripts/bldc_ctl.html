<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BLDC Controller</title>
<style>
  :root {
    --bg: #111;
    --panel: #1c1c20;
    --fg: #eee;
    --muted: #888;
    --accent: #4ea1ff;
    --ok: #4caf50;
    --err: #ef5350;
  }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  .wrap {
    max-width: 560px;
    margin: 32px auto;
    padding: 24px;
    background: var(--panel);
    border-radius: 12px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.4);
  }
  h1 {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 600;
  }
  .sub {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 20px;
  }
  .row {
    margin: 18px 0;
  }
  .row label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .row label .val {
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
  }
  select, button {
    width: 100%;
    padding: 10px 12px;
    background: #2a2a30;
    color: var(--fg);
    border: 1px solid #3a3a44;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
  }
  button {
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover:not(:disabled) { background: #34343c; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary {
    background: var(--accent);
    color: #001124;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover:not(:disabled) { background: #6ab3ff; }
  .controls { opacity: 0.4; pointer-events: none; transition: opacity 0.2s; }
  .controls.live { opacity: 1; pointer-events: auto; }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted);
  }
  .dot.ok { background: var(--ok); }
  .dot.err { background: var(--err); }
  .conn { display: flex; gap: 8px; }
  .conn button { flex: 1; }
  .nosup {
    background: #3a1c1c;
    border: 1px solid var(--err);
    color: #ffbdbd;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .tele-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 16px;
    margin-top: 6px;
    padding: 8px 12px;
    background: #15151a;
    border: 1px solid #2a2a30;
    border-radius: 8px;
  }
  .tele-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 12px;
    color: var(--muted);
  }
  .tele-val {
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>BLDC Controller</h1>
  <div class="sub">iCE40 SPWM motor controller · UART 115200 8N1</div>

  <div id="nosup" class="nosup" hidden>
    Web Serial is not available in this browser. Use Chrome, Edge, or Opera
    on desktop, served over <code>https://</code> or <code>localhost</code>.
  </div>

  <div class="row conn">
    <button id="btn-connect" class="primary">Connect serial…</button>
    <button id="btn-disconnect" disabled>Disconnect</button>
  </div>
  <div class="status">
    <span id="dot" class="dot"></span>
    <span id="status">Not connected</span>
  </div>

  <div id="controls" class="controls">
    <div class="row">
      <label for="mode">Mode <span id="mode-val" class="val">OPEN</span></label>
      <select id="mode">
        <option value="0">OPEN (coast)</option>
        <option value="1">RUNNING</option>
        <option value="2">BRAKE</option>
      </select>
    </div>

    <div class="row">
      <label for="speed">Speed (Negative means Reverse)<span class="val"><span id="speed-val">0</span> Hz</span></label>
      <input id="speed" type="range" min="-200" max="200" step="0.1" value="0">
    </div>

    <div class="row">
      <label for="amp">Amplitude <span class="val"><span id="amp-val">0</span> / 255</span></label>
      <input id="amp" type="range" min="0" max="255" step="1" value="0">
    </div>

    <div class="row telemetry">
      <label>Telemetry <span class="val"><span id="tele-rate">0</span> fps</span></label>
      <div class="tele-grid">
        <div class="tele-row"><span class="tele-name">UH thr</span><span class="tele-val" id="t-u-minus">—</span></div>
        <div class="tele-row"><span class="tele-name">UL thr</span><span class="tele-val" id="t-u-plus">—</span></div>
        <div class="tele-row"><span class="tele-name">VH thr</span><span class="tele-val" id="t-v-minus">—</span></div>
        <div class="tele-row"><span class="tele-name">VL thr</span><span class="tele-val" id="t-v-plus">—</span></div>
        <div class="tele-row"><span class="tele-name">WH thr</span><span class="tele-val" id="t-w-minus">—</span></div>
        <div class="tele-row"><span class="tele-name">WL thr</span><span class="tele-val" id="t-w-plus">—</span></div>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";

// PWM frequency: clk_fast / (2 * counter_period) = 82.5 MHz / (2 * 2048)
const F_PWM_HZ = 82_500_000 / (2 * 2048);   // ≈ 20141.60 Hz

// Status-byte command codes (low 7 bits of the sync byte).
const CMD_STATE = 0x00;   // reserved; FPGA currently ignores
const CMD_SPEED = 0x01;
const CMD_AMP   = 0x02;

const MODE_NAMES = { 0: "OPEN", 1: "RUNNING", 2: "BRAKE" };

const $ = (id) => document.getElementById(id);
const btnConnect    = $("btn-connect");
const btnDisconnect = $("btn-disconnect");
const dot           = $("dot");
const statusEl      = $("status");
const controls      = $("controls");
const modeSel       = $("mode");
const speedSl       = $("speed");
const ampSl         = $("amp");
const modeValEl     = $("mode-val");
const speedValEl    = $("speed-val");
const ampValEl      = $("amp-val");
const teleEls = {
  uMinus: $("t-u-minus"), uPlus: $("t-u-plus"),
  vMinus: $("t-v-minus"), vPlus: $("t-v-plus"),
  wMinus: $("t-w-minus"), wPlus: $("t-w-plus"),
  rate:   $("tele-rate"),
};

let port = null;
let writer = null;
let writing = false;
let pending = null;   // latest queued packet while a write is in flight
let reader = null;
let readLoopAlive = false;
let frameCount = 0;

function setStatus(text, kind = "") {
  statusEl.textContent = text;
  dot.className = "dot" + (kind ? " " + kind : "");
}

function setConnected(connected) {
  controls.classList.toggle("live", connected);
  btnConnect.disabled = connected;
  btnDisconnect.disabled = !connected;
}

if (!("serial" in navigator)) {
  $("nosup").hidden = false;
  btnConnect.disabled = true;
}

btnConnect.addEventListener("click", connect);
btnDisconnect.addEventListener("click", disconnect);

async function connect() {
  try {
    setStatus("Requesting port…");
    port = await navigator.serial.requestPort();
    await port.open({
      baudRate: 115200,
      dataBits: 8,
      stopBits: 1,
      parity: "none",
      flowControl: "none",
    });
    writer = port.writable.getWriter();
    setConnected(true);
    setStatus("Connected", "ok");

    // Push current UI state to the device so it matches what the user sees.
    await sendAmplitude(+ampSl.value);
    await sendSpeed(+speedSl.value);
    await sendState(+modeSel.value);

    // Start pulling telemetry frames from the device.
    startReadLoop();

    port.addEventListener("disconnect", onPortDisconnect);
  } catch (err) {
    setStatus(err.message || String(err), "err");
    await cleanup();
  }
}

async function disconnect() {
  // Best-effort: park the controller in OPEN before closing.
  try { if (writer) await sendState(0); } catch (_) {}
  await cleanup();
  setStatus("Disconnected");
}

function onPortDisconnect() {
  setStatus("Device unplugged", "err");
  cleanup();
}

async function cleanup() {
  setConnected(false);
  readLoopAlive = false;
  try { if (reader) { await reader.cancel().catch(() => {}); reader.releaseLock?.(); } } catch (_) {}
  reader = null;
  try { if (writer) { await writer.close().catch(() => {}); writer.releaseLock?.(); } } catch (_) {}
  writer = null;
  try { if (port) await port.close(); } catch (_) {}
  port = null;
  // Blank telemetry on disconnect.
  teleEls.uMinus.textContent = "—";
  teleEls.uPlus.textContent  = "—";
  teleEls.vMinus.textContent = "—";
  teleEls.vPlus.textContent  = "—";
  teleEls.wMinus.textContent = "—";
  teleEls.wPlus.textContent  = "—";
  teleEls.rate.textContent   = "0";
}

// Pull telemetry frames off port.readable. Frame format (14 bytes):
//   [0xAA] [0x55] [u_minus_hi][u_minus_lo] [u_plus_hi][u_plus_lo]
//                  [v_minus_hi][v_minus_lo] [v_plus_hi][v_plus_lo]
//                  [w_minus_hi][w_minus_lo] [w_plus_hi][w_plus_lo]
// Each 11-bit value is sent big-endian in 2 bytes; high byte is always
// ≤ 0x07 so 0xAA/0x55 cannot collide with data.
async function startReadLoop() {
  if (!port || !port.readable) return;
  readLoopAlive = true;
  reader = port.readable.getReader();
  const buf = [];

  // fps counter (updated every 500ms).
  let frameWindowStart = performance.now();
  const fpsInterval = setInterval(() => {
    const now = performance.now();
    const dt = (now - frameWindowStart) / 1000;
    if (dt > 0) teleEls.rate.textContent = Math.round(frameCount / dt).toString();
    frameCount = 0;
    frameWindowStart = now;
  }, 500);

  try {
    while (readLoopAlive) {
      const { value, done } = await reader.read();
      if (done) break;
      if (!value) continue;
      for (let i = 0; i < value.length; i++) buf.push(value[i]);

      // Hunt for AA-55 framed packets. Drop one byte at a time until sync.
      while (buf.length >= 14) {
        if (buf[0] !== 0xAA || buf[1] !== 0x55) {
          buf.shift();
          continue;
        }
        const u_minus = ((buf[2] & 0x07) << 8) | buf[3];
        const u_plus  = ((buf[4] & 0x07) << 8) | buf[5];
        const v_minus = ((buf[6] & 0x07) << 8) | buf[7];
        const v_plus  = ((buf[8] & 0x07) << 8) | buf[9];
        const w_minus = ((buf[10] & 0x07) << 8) | buf[11];
        const w_plus  = ((buf[12] & 0x07) << 8) | buf[13];
        teleEls.uMinus.textContent = u_minus.toString();
        teleEls.uPlus.textContent  = u_plus.toString();
        teleEls.vMinus.textContent = v_minus.toString();
        teleEls.vPlus.textContent  = v_plus.toString();
        teleEls.wMinus.textContent = w_minus.toString();
        teleEls.wPlus.textContent  = w_plus.toString();
        frameCount++;
        buf.splice(0, 14);
      }
    }
  } catch (err) {
    // Reader was cancelled (normal on disconnect) or hardware error.
  } finally {
    clearInterval(fpsInterval);
    readLoopAlive = false;
  }
}

// Build a 7-byte MIDI-framed packet:
//   [sync = 0x80|cmd] [D4][D3][D2][D1][D0] [XOR checksum]
// Each non-sync byte has MSB=0; payload is 5 × 7 = 35 bits, big-endian.
function packet(cmd, payload) {
  const v = payload >>> 0;
  const sync = 0x80 | (cmd & 0x7F);
  const d4 = (v >>> 28) & 0x7F;
  const d3 = (v >>> 21) & 0x7F;
  const d2 = (v >>> 14) & 0x7F;
  const d1 = (v >>>  7) & 0x7F;
  const d0 = (v >>>  0) & 0x7F;
  const cs = (cmd ^ d4 ^ d3 ^ d2 ^ d1 ^ d0) & 0x7F;
  return new Uint8Array([sync, d4, d3, d2, d1, d0, cs]);
}

// Coalesce while a write is in flight: only the most recent packet for a
// given cmd needs to actually reach the wire.
async function send(pkt) {
  if (!writer) return;
  pending = pkt;
  if (writing) return;
  writing = true;
  try {
    while (pending) {
      const next = pending;
      pending = null;
      await writer.write(next);
    }
  } catch (err) {
    setStatus("Write failed: " + (err.message || err), "err");
    await cleanup();
  } finally {
    writing = false;
  }
}

function sendState(state) {
  return send(packet(CMD_STATE, state & 0xff));
}

function sendAmplitude(amp) {
  return send(packet(CMD_AMP, amp & 0xff));
}

function sendSpeed(hz) {
  // 32-bit NCO phase increment. Negative frequencies wrap via two's
  // complement and produce reverse rotation in the NCO.
  let inc = Math.round(hz * 0x1_0000_0000 / F_PWM_HZ);
  inc = ((inc % 0x1_0000_0000) + 0x1_0000_0000) % 0x1_0000_0000;
  return send(packet(CMD_SPEED, inc));
}

// --- UI wiring -----------------------------------------------------------

modeSel.addEventListener("change", () => {
  const v = +modeSel.value;
  modeValEl.textContent = MODE_NAMES[v];
  sendState(v);
});

speedSl.addEventListener("input", () => {
  speedValEl.textContent = (+speedSl.value).toFixed(1);
  sendSpeed(+speedSl.value);
});

ampSl.addEventListener("input", () => {
  ampValEl.textContent = ampSl.value;
  sendAmplitude(+ampSl.value);
});

// Initialize labels from default slider values.
modeValEl.textContent  = MODE_NAMES[+modeSel.value];
speedValEl.textContent = (+speedSl.value).toFixed(1);
ampValEl.textContent   = ampSl.value;
</script>
</body>
</html>
